name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest

      - name: CLI help
        run: mfigci --help

      - name: Smoke scan
        run: mfigci scan --config mfigci.yml

      - name: Smoke gallery and check
        run: |
          mkdir -p gallery
          mfigci gallery --config mfigci.yml
          mfigci check --config mfigci.yml --report mfigci-report.md
