name: Package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/mfigci-wheel-smoke
          /tmp/mfigci-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/mfigci-wheel-smoke/bin/mfigci --version
          /tmp/mfigci-wheel-smoke/bin/mfigci --help
