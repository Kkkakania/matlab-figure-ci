project:
  name: matlab-scientific-figures

presets:
  - matlab-figures

scan:
  include:
    - "."
  exclude:
    - ".git"
    - ".venv"
    - ".venv*"
    - "venv"
    - "__pycache__"
    - "pycache"
    - "dist"
    - "build"
    - ".pytest_cache"
    - ".ipynb_checkpoints"
    - "LICENSE"
    - "src/matlab_figure_ci.egg-info"
    - "src/matlab_figure_ci/config.py"
    - "mfigci.example.yml"
    - "tests"
    - "tests/fixtures"

privacy:
  enabled: true
  redact_matches: true

provenance:
  enabled: true

extensions:
  error:
    - ".p"
    - ".mat"
    - ".fig"
    - ".doc"
    - ".docx"
    - ".xlsx"
    - ".vsd"
  warning:
    - ".pdf"
    - ".mlx"
    - ".zip"
  allow:
    - path: "gallery"
      extensions:
        - ".pdf"

generated_assets:
  enabled: true
  severity: warning
  source_dirs:
    - "src"
    - "examples"
    - "templates"
    - "skills"
    - "scripts"
  extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".bmp"
    - ".tif"
    - ".tiff"
    - ".gif"
    - ".svg"
    - ".pdf"
  allow: []

gallery:
  path: "gallery"
  allowed_extensions:
    - ".png"
    - ".svg"
    - ".pdf"
  min_size_bytes: 1
  expected: []

matlab:
  enabled: false
  bin_env: "MATLAB_BIN"
  fallback_bin: "matlab"
  batch_command: "run_all_figures"
